[filters.just]
description = "Compact just task runner output — strip recipe headers, keep command output"
match_command = "^just\\b"
strip_ansi = true
strip_lines_matching = [
  "^\\s*$",
  "^\\s*Available recipes:",
  "^\\s*just --list",
]
truncate_lines_at = 150
tail_lines = 200

[[tests.just]]
name = "preserves command output"
input = "cargo test\n\ntest result: ok. 42 passed; 0 failed\n"
expected = "cargo test\ntest result: ok. 42 passed; 0 failed"

[[tests.just]]
name = "preserves error output"
input = "error: Compilation failed\nsrc/main.rs:10: expected `;`"
expected = "error: Compilation failed\nsrc/main.rs:10: expected `;`"

[[tests.just]]
name = "empty input"
input = ""
expected = ""

[[tests.just]]
name = "tail keeps failure summary from long output"
input = "running 300 tests\n...................................................\n...................................................\n...................................................\n...................................................\n...................................................\nFAILED tests/foo_test.rs — assertion failed at line 42\nFAILED tests/bar_test.rs — expected 1, got 2\ntest result: FAILED. 298 passed; 2 failed"
expected = "running 300 tests\n...................................................\n...................................................\n...................................................\n...................................................\n...................................................\nFAILED tests/foo_test.rs — assertion failed at line 42\nFAILED tests/bar_test.rs — expected 1, got 2\ntest result: FAILED. 298 passed; 2 failed"
